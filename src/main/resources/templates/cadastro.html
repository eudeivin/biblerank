<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - BibleRank</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<h2>Entre no Propósito de Leitura</h2>
<form th:action="@{/salvar}" th:object="${usuario}" method="post" class="card p-4 shadow">
    <div class="mb-3">
        <label>Nome:</label>
        <input type="text" th:field="*{nome}" class="form-control" placeholder="Seu nome" required>
    </div>
    <div class="mb-3">
        <label>E-mail:</label>
        <input type="email" th:field="*{email}" class="form-control" placeholder="seu@email.com" required>
    </div>
    <div class="mb-3">
        <label>Senha:</label>
        <input type="password" th:field="*{senha}" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary">Começar a Ler!</button>
</form>
</body>
</html>
