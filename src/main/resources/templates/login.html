<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - BibleRank</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f6; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 100%; max-width: 400px; padding: 20px; border-radius: 15px; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="login-card">
    <h2 class="text-center mb-4">Acessar Ranking</h2>

    <div th:if="${param.error}" class="alert alert-danger">
        E-mail ou senha incorretos!
    </div>

    <div th:if="${param.logout}" class="alert alert-info">
        Você saiu com sucesso.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label">E-mail</label>
            <input type="email" name="username" class="form-control" placeholder="exemplo@igreja.com" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Senha</label>
            <input type="password" name="password" class="form-control" placeholder="Sua senha" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">Entrar</button>
    </form>

    <div class="text-center mt-3">
        <a href="/cadastro" class="text-decoration-none small">Ainda não tenho cadastro</a>
        <br>
        <a href="/" class="text-decoration-none small text-muted">Voltar ao Ranking</a>
    </div>
</div>

</body>
</html>
